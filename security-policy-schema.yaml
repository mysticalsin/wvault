# ============================================================================
# WVAULT ENTERPRISE SECURITY POLICY SCHEMA
# ============================================================================
# This YAML file defines enterprise-grade security policies for WVault
# Version: 5.0.0
# Classification: INTERNAL USE ONLY
# ============================================================================

version: "5.0.0"
organization:
  name: "ACME Corporation"
  security_contact: "security@acme.com"
  incident_response_team: "irt@acme.com"

# ============================================================================
# PHASE 1: BUSINESS-GRADE CORE - RBAC CONFIGURATION
# ============================================================================

rbac:
  enabled: true
  enforce_principle_of_least_privilege: true
  
  roles:
    super_admin:
      description: "Full system access - IT Security Team Only"
      permissions:
        - "*"  # Wildcard = all permissions
      mfa_required: true
      hardware_key_required: true
      session_timeout: 15  # minutes
      allowed_ips: []  # Empty = any IP
      
    admin:
      description: "Department administrators"
      permissions:
        - "vault:create"
        - "vault:delete"
        - "vault:manage"
        - "user:manage"
        - "audit:view"
        - "credential:read"
        - "credential:write"
        - "credential:delete"
        - "credential:share"
      mfa_required: true
      hardware_key_required: false
      session_timeout: 30
      max_vaults: 10
      
    manager:
      description: "Team leads and project managers"
      permissions:
        - "credential:read"
        - "credential:write"
        - "credential:share"
        - "vault:read"
        - "user:view"
      mfa_required: true
      session_timeout: 60
      max_vaults: 5
      can_request_elevated_access: true
      
    contributor:
      description: "Regular employees"
      permissions:
        - "credential:read"
        - "credential:write"
        - "vault:read"
      mfa_required: false
      session_timeout: 120
      max_vaults: 3
      
    read_only:
      description: "Contractors and temporary staff"
      permissions:
        - "credential:read"
        - "vault:read"
      mfa_required: false
      session_timeout: 60
      ip_restricted: true
      allowed_networks:
        - "10.0.0.0/8"
        - "192.168.1.0/24"

  # Vault-Specific Permissions
  vault_policies:
    - vault_id: "financial_vault"
      restricted_roles: ["manager", "contributor", "read_only"]
      require_approval_for_access: true
      approvers: ["finance_director", "cto"]
      
    - vault_id: "admin_vault"
      restricted_roles: ["admin", "super_admin"]
      require_hardware_key: true
      time_restricted:
        allowed_hours:
          start: 9
          end: 17
        timezone: "America/New_York"

# ============================================================================
# PHASE 1: IDENTITY PROVIDER (IdP) INTEGRATION
# ============================================================================

identity_provider:
  enabled: true
  provider_type: "saml"  # Options: saml, oidc, ldap
  
  saml:
    idp_entity_id: "https://acme.okta.com"
    sso_url: "https://acme.okta.com/app/glassvault/sso/saml"
    certificate: "/etc/glassvault/saml/idp-cert.pem"
    
    # SAML Attribute Mappings
    attribute_mapping:
      email: "user.email"
      first_name: "user.firstName"
      last_name: "user.lastName"
      groups: "groups"
      department: "user.department"
      employee_id: "user.employeeNumber"
      
    # Group to Role Mapping
    group_mappings:
      "IT-Security-Admins": "super_admin"
      "IT-Admins": "admin"
      "Department-Managers": "manager"
      "Employees": "contributor"
      "Contractors": "read_only"
      
    # Advanced SAML Settings
    want_assertions_signed: true
    want_response_signed: true
    signature_algorithm: "rsa-sha256"
    digest_algorithm: "sha256"
    name_id_format: "urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress"
    
  oidc:
    issuer: "https://login.microsoftonline.com/{tenant}/v2.0"
    authorization_endpoint: "https://login.microsoftonline.com/{tenant}/oauth2/v2.0/authorize"
    token_endpoint: "https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token"
    userinfo_endpoint: "https://graph.microsoft.com/oidc/userinfo"
    client_id: "{{ env.OIDC_CLIENT_ID }}"
    client_secret: "{{ env.OIDC_CLIENT_SECRET }}"
    scopes: ["openid", "profile", "email", "groups"]
    
  ldap:
    server: "ldap.corp.acme.com"
    port: 636
    bind_dn: "cn=glassvault,ou=service,dc=acme,dc=com"
    base_dn: "ou=users,dc=acme,dc=com"
    use_ssl: true
    
    # LDAP Attribute Mappings
    attribute_mapping:
      username: "sAMAccountName"
      email: "mail"
      full_name: "cn"
      groups: "memberOf"

# ============================================================================
# PHASE 1: AUDIT LOGGING & SIEM INTEGRATION
# ============================================================================

audit_logging:
  enabled: true
  level: "verbose"  # Options: minimal, standard, verbose, debug
  
  # Events to Log
  logged_events:
    authentication:
      - "login_success"
      - "login_failure"
      - "logout"
      - "mfa_challenge"
      - "mfa_success"
      - "mfa_failure"
      - "session_timeout"
      - "password_change"
      
    access_control:
      - "vault_opened"
      - "vault_closed"
      - "credential_viewed"
      - "credential_copied"
      - "credential_edited"
      - "credential_created"
      - "credential_deleted"
      - "credential_shared"
      - "permission_denied"
      
    security:
      - "brute_force_detected"
      - "account_lockout"
      - "honeypot_triggered"
      - "geofence_violation"
      - "biometric_mismatch"
      - "suspicious_activity"
      
    administration:
      - "user_created"
      - "user_deleted"
      - "role_changed"
      - "policy_updated"
      - "audit_exported"
  
  # Log Retention
  retention:
    local_days: 90
    siem_days: 365
    cold_storage_days: 2555  # 7 years for compliance
    
  # SIEM Integration
  siem:
    enabled: true
    format: "json"  # Options: json, cef, leef
    transport: "https"  # Options: https, tcp, udp, file
    
    endpoints:
      primary:
        url: "https://splunk-hec.acme.com:8088/services/collector"
        token: "{{ env.SPLUNK_HEC_TOKEN }}"
        index: "security_glassvault"
        sourcetype: "glassvault:audit"
        
      secondary:
        url: "tcp://qradar.acme.com:514"
        format: "leef"
        
    batching:
      enabled: true
      size: 100
      timeout_ms: 5000
      
    encryption:
      tls_version: "1.3"
      verify_certificate: true
      client_certificate: "/etc/glassvault/certs/client.pem"
      
  # Real-time Alerting
  alerting:
    critical_events:
      channels:
        - type: "email"
          recipients: ["security@acme.com", "soc@acme.com"]
          
        - type: "slack"
          webhook: "{{ env.SLACK_SECURITY_WEBHOOK }}"
          channel: "#security-alerts"
          
        - type: "pagerduty"
          integration_key: "{{ env.PAGERDUTY_KEY }}"
          severity: "critical"
          
    high_events:
      channels:
        - type: "email"
          recipients: ["security@acme.com"]
          
        - type: "slack"
          webhook: "{{ env.SLACK_SECURITY_WEBHOOK }}"
          channel: "#security-alerts"

# ============================================================================
# PHASE 2: FAILURE AUDIT SYSTEM - BRUTE FORCE DETECTION
# ============================================================================

brute_force_protection:
  enabled: true
  
  # Detection Thresholds
  thresholds:
    max_attempts: 5
    window_minutes: 30
    lockout_duration_minutes: 30
    progressive_lockout: true
    
  progressive_lockout_durations:
    - attempts: 5
      duration: 30
    - attempts: 10
      duration: 60
    - attempts: 15
      duration: 240
    - attempts: 20
      duration: 1440  # 24 hours
      require_admin_unlock: true
      
  # Metadata Capture (for forensics)
  metadata_capture:
    timestamp: true
    ip_address: true
    user_agent: true
    device_fingerprint: true
    geolocation: true
    network_info: true
    typing_cadence: true
    mouse_patterns: true
    
  # Alerting
  alerting:
    on_threshold_reached: true
    on_lockout_triggered: true
    channels: ["email", "slack", "sms"]
    
  # IP-based Rate Limiting
  ip_rate_limiting:
    enabled: true
    max_attempts_per_ip: 20
    window_minutes: 60
    ban_duration_minutes: 60

# ============================================================================
# PHASE 2: ACCOUNT LOCKDOWN PROCEDURES
# ============================================================================

account_lockdown:
  auto_lockdown_triggers:
    - "brute_force_threshold_exceeded"
    - "honeypot_credential_accessed"
    - "impossible_travel_detected"
    - "credential_sharing_anomaly"
    
  lockdown_actions:
    - action: "invalidate_all_sessions"
      immediate: true
      
    - action: "require_password_reset"
      immediate: true
      
    - action: "notify_security_team"
      channels: ["email", "slack", "pagerduty"]
      
    - action: "enable_enhanced_monitoring"
      duration_hours: 72
      
    - action: "require_hardware_key"
      duration_days: 7
      
  manual_unlock:
    require_two_admin_approval: true
    require_identity_verification: true
    verification_methods:
      - "video_call"
      - "manager_confirmation"
      - "hr_verification"

# ============================================================================
# PHASE 3: HONEY-POT CREDENTIALS
# ============================================================================

honeypot_credentials:
  enabled: true
  
  # Decoy Generation
  decoy_count: 5
  decoy_types:
    - type: "admin_account"
      naming_pattern: "admin_{random}"
      service_patterns: ["AWS Root", "Azure AD", "Domain Admin"]
      
    - type: "service_account"
      naming_pattern: "svc_{random}"
      service_patterns: ["Database", "Backup", "Monitoring"]
      
    - type: "executive_account"
      naming_pattern: "{ceo|cfo|cto}_{random}"
      service_patterns: ["Email", "VPN", "Remote Desktop"]
  
  # Placement Strategy
  placement:
    mix_with_real_credentials: true
    randomize_positions: true
    add_realistic_metadata: true
    
  # Detection & Response
  detection:
    trigger_on:
      - "view"
      - "copy"
      - "edit"
      - "share"
      
  response:
    immediate_actions:
      - "trigger_silent_alarm"
      - "log_forensic_evidence"
      - "capture_screenshot"
      - "record_session"
      
    escalation_actions:
      - action: "account_lockdown"
        delay_seconds: 30  # Delay to gather more evidence
        
      - action: "isolate_device"
        notify_network_team: true
        
      - action: "notify_security_team"
        channels: ["email", "slack", "pagerduty", "sms"]
        
    evidence_preservation:
      capture_screenshot: true
      record_session_video: true
      dump_memory_forensics: true
      preserve_network_logs: true

# ============================================================================
# PHASE 3: BIOMETRIC VELOCITY CHECK
# ============================================================================

biometric_velocity:
  enabled: true
  
  # Keystroke Dynamics
  keystroke_dynamics:
    enabled: true
    collect_samples: true
    required_baseline_samples: 10
    
    metrics:
      - "dwell_time"  # Time key is held down
      - "flight_time"  # Time between key presses
      - "typing_speed_wpm"
      - "error_rate"
      - "backspace_pattern"
      
    tolerance:
      deviation_threshold: 0.15  # 15% deviation triggers additional verification
      confidence_threshold: 0.85  # Require 85% confidence match
      
  # Mouse Movement Analysis
  mouse_dynamics:
    enabled: true
    
    metrics:
      - "movement_velocity"
      - "acceleration_patterns"
      - "jitter_analysis"
      - "click_patterns"
      - "idle_patterns"
      
  # Behavioral Biometrics
  behavioral_analysis:
    enabled: true
    
    patterns:
      - "application_usage_order"
      - "credential_access_patterns"
      - "time_of_day_patterns"
      - "scroll_behavior"
      
  # Response Actions
  mismatch_response:
    low_confidence:  # 70-84%
      action: "require_software_mfa"
      log_level: "warning"
      
    medium_confidence:  # 50-69%
      action: "require_hardware_mfa"
      log_level: "high"
      notify_security: true
      
    high_risk:  # < 50%
      action: "block_and_alert"
      immediate_lockdown: true
      require_admin_verification: true

# ============================================================================
# PHASE 3: DYNAMIC GEO-FENCING
# ============================================================================

geo_fencing:
  enabled: true
  
  # Default Policy
  default_policy: "allow"  # Options: allow, deny
  
  # Vault-Specific Policies
  vault_policies:
    - vault_id: "financial_vault"
      policy: "restrictive"
      
      allowed_countries:
        - "US"
        - "CA"
        - "GB"
        - "DE"
        
      blocked_countries:
        - "*"  # Block all others
        
      trusted_networks:
        - "10.0.0.0/8"  # Corporate HQ
        - "192.168.100.0/24"  # Branch offices
        
      require_corporate_vpn: true
      vpn_check_endpoint: "https://vpn.acme.com/verify"
      
      gps_boundary:
        enabled: false  # Too restrictive for roaming employees
        
      time_restrictions:
        timezone: "America/New_York"
        business_hours:
          monday: { start: "09:00", end: "17:00" }
          tuesday: { start: "09:00", end: "17:00" }
          wednesday: { start: "09:00", end: "17:00" }
          thursday: { start: "09:00", end: "17:00" }
          friday: { start: "09:00", end: "17:00" }
        weekend_access: false
        
    - vault_id: "development_vault"
      policy: "permissive"
      
      allowed_countries:
        - "US"
        - "CA"
        - "GB"
        - "DE"
        - "IN"
        - "SG"
        - "AU"
        
      require_corporate_vpn: false
      
      time_restrictions:
        enabled: false  # Dev teams work varied hours
        
  # Impossible Travel Detection
  impossible_travel:
    enabled: true
    max_velocity_kmh: 900  # Maximum plausible travel speed
    
    detection_rules:
      - name: "same_hour_different_continents"
        description: "Login from different continents within same hour"
        action: "immediate_lockdown"
        
      - name: "rapid_country_switch"
        description: "Login from different countries within 2 hours"
        action: "require_mfa"
        
  # BYOD Policy
  byod:
    enabled: true
    require_device_registration: true
    require_device_compliance:
      - "encryption_enabled"
      - "antivirus_installed"
      - "os_patched"
      - "jailbreak_check"

# ============================================================================
# COMPLIANCE & REPORTING
# ============================================================================

compliance:
  frameworks:
    - name: "SOC2"
      controls: ["CC6.1", "CC6.2", "CC6.3", "CC7.1", "CC7.2"]
      
    - name: "GDPR"
      data_retention_days: 2555
      right_to_erasure: true
      data_portability: true
      
    - name: "HIPAA"
      encryption_required: true
      audit_logging_required: true
      access_controls_required: true
      
    - name: "PCI-DSS"
      version: "4.0"
      applicable_sections: ["8.2", "8.3", "10.2", "10.3"]
  
  reporting:
    automated_reports:
      - name: "weekly_security_summary"
        schedule: "0 9 * * MON"  # Cron format
        recipients: ["security@acme.com"]
        
      - name: "monthly_access_review"
        schedule: "0 9 1 * *"
        recipients: ["security@acme.com", "compliance@acme.com"]
        include_inactive_users: true
        
      - name: "quarterly_compliance_report"
        schedule: "0 9 1 */3 *"
        recipients: ["ciso@acme.com", "audit@acme.com"]
        frameworks: ["SOC2", "GDPR"]

# ============================================================================
# DEPLOYMENT CONFIGURATION
# ============================================================================

deployment:
  environment: "production"
  
  infrastructure:
    primary_region: "us-east-1"
    backup_region: "us-west-2"
    
    high_availability:
      enabled: true
      replication_factor: 3
      
    disaster_recovery:
      rpo_minutes: 5
      rto_minutes: 30
      
  security:
    encryption_at_rest: "AES-256-GCM"
    encryption_in_transit: "TLS1.3"
    key_management: "AWS KMS / HashiCorp Vault"
    
    network_security:
      vpc_isolation: true
      security_groups_restrictive: true
      waf_enabled: true
      ddos_protection: true
      
  monitoring:
    health_checks:
      interval_seconds: 30
      
    metrics:
      - "auth_latency"
      - "vault_operations"
      - "security_events"
      - "user_sessions"
      
    alerting:
      thresholds:
        - metric: "failed_auth_rate"
          condition: "> 10%"
          duration: "5m"
